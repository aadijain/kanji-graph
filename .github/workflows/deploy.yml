name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache dictionaries
        id: cache-dicts
        uses: actions/cache@v4
        with:
          path: ~/.local/share/japanese-dicts
          key: dicts-v2

      - name: Download dictionaries
        if: steps.cache-dicts.outputs.cache-hit != 'true'
        run: |
          npm run fetch-jitendex
          npm run fetch-freq-dict
          npm run fetch-jmdict-furigana

      - run: npm run build-graph

      - run: npm run build
        env:
          GITHUB_ACTIONS: true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
